<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Księga Smoków</title>

<link rel="stylesheet" href="style.css">
</head>
📖
<body>

<div class="top-bar">
  <a href="#" class="back-btn" onclick="zamknijKsiege()">⬅ Strona główna</a>
  <header>📖 Księga Smoków</header>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Szukaj smoka...">
</div>

<div class="container" id="container"></div>

<script src="smoki.js"></script>

<script>
// GENEROWANIE
const container = document.getElementById("container");

smoki.forEach(smok => {
  const div = document.createElement("div");
  div.className = "dragon-card";
  div.dataset.name = smok.nazwa;

  div.innerHTML = `
    <div class="fav">❤️</div>
    <img src="${smok.zdjecie}">
    <div class="card-top">
      <div class="dragon-name">${smok.nazwa}</div>
      <div class="badge">${smok.typ}</div>
    </div>

    <div class="dragon-info">
      <div class="section">⚔️ ${smok.atak}</div>
      <div class="section">🍖 ${smok.pokarm}</div>

      <div class="section">
        📊 Moc:
        <div class="power-bar">
          <div class="power-fill" style="width:${smok.moc}%"></div>
        </div>
      </div>

      <div class="section">
        ⭐ Ocena:
        <div class="stars">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </div>
      </div>
    </div>
  `;

  container.appendChild(div);
});

// EVENTY
setTimeout(() => {
  document.querySelectorAll(".dragon-card").forEach(card => {
    card.addEventListener("click", () => {
      card.classList.toggle("active");
    });
  });

  document.querySelectorAll(".stars").forEach(box => {
    const stars = box.querySelectorAll(".star");
    stars.forEach((star, i) => {
      star.addEventListener("click", (e) => {
        e.stopPropagation();
        stars.forEach((s, j) => {
          s.classList.toggle("active", j <= i);
        });
      });
    });
  });

  document.querySelectorAll(".dragon-card").forEach(card => {
    const fav = card.querySelector(".fav");
    const name = card.dataset.name;

    if (localStorage.getItem(name)) fav.classList.add("active");

    fav.addEventListener("click", (e) => {
      e.stopPropagation();
      fav.classList.toggle("active");

      if (fav.classList.contains("active")) {
        localStorage.setItem(name, "1");
      } else {
        localStorage.removeItem(name);
      }
    });
  });
}, 100);

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  document.querySelectorAll(".dragon-card").forEach(card => {
    card.style.display = card.dataset.name.toLowerCase().includes(value)
      ? "block" : "none";
  });
});
</script>
<script>
function zamknijKsiege() {
  document.body.classList.add("zamkniecie");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 600); // musi być tyle co animacja
}
</script>
<script>
// efekt przy wejściu
window.addEventListener("load", () => {
  document.body.classList.add("otwieranie");
});
</script>
</body>
</html>
