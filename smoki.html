<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Księga Smoków</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  <a href="/index.html" class="back-btn" onclick="zamknijKsiege()">⬅ Strona główna</a>
  <header>📖 Księga Smoków</header>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Szukaj smoka...">
</div>

<div class="controls">

  <div id="featuredDragon"></div>

  <select id="classFilter">
    <option value="all">Wszystkie klasy</option>
  </select>

  <select id="sortSelect">
    <option value="powerDesc">Najmocniejsze</option>
    <option value="powerAsc">Najsłabsze</option>
    <option value="nameAsc">A-Z</option>
  </select>

  <button class="theme-btn" onclick="toggleTheme()">🌙 / ☀️</button>

</div>

<div class="compare-box">
  <select id="dragon1"></select>
  <select id="dragon2"></select>
  <button onclick="compareDragons()">⚔️ Porównaj</button>

  <div id="vsBox">VS</div>

  <div id="compareResult"></div>
</div>

<div class="container" id="container"></div>

<script src="smoki.js"></script>

<script>
const container = document.getElementById("container");

/* CLASSES */
const classes = [...new Set(smoki.map(s => s.typ))];
classes.forEach(c => {
  document.getElementById("classFilter").innerHTML +=
    `<option value="${c}">${c}</option>`;
});

/* SMOK DNIA */
function renderDragonOfDay(){
  const d = smoki[new Date().getDate() % smoki.length];

  document.getElementById("featuredDragon").innerHTML = `
    <div class="dragon-card active featured">

      <img src="${d.zdjecie}">

      <div class="card-top">
        <div class="dragon-name">🔥 Smok Dnia: ${d.nazwa}</div>
        <div class="badge">${d.typ}</div>
      </div>

      <div class="dragon-info" style="max-height:400px;">
        <div class="section">⚔️ ${d.atak}</div>
        <div class="section">🍖 ${d.pokarm}</div>
        <div class="section">📊 Moc: <strong>${d.moc}/100</strong>
          <div class="power-bar">
            <div class="power-fill" style="width:${d.moc}%"></div>
          </div>
        </div>
      </div>

    </div>
  `;
}

/* RENDER */
function render(){

  container.innerHTML = "";

  let data = [...smoki];

  const filter = document.getElementById("classFilter").value;
  const sort = document.getElementById("sortSelect").value;
  const search = document.getElementById("search").value.toLowerCase();

  if(filter !== "all"){
    data = data.filter(s => s.typ === filter);
  }

  data = data.filter(s => s.nazwa.toLowerCase().includes(search));

  if(sort === "powerDesc") data.sort((a,b)=>b.moc-a.moc);
  if(sort === "powerAsc") data.sort((a,b)=>a.moc-b.moc);
  if(sort === "nameAsc") data.sort((a,b)=>a.nazwa.localeCompare(b.nazwa));

  data.forEach(s => {

    const div = document.createElement("div");
    div.className = "dragon-card";
    div.dataset.name = s.nazwa;

    div.innerHTML = `
      <div class="fav ${localStorage.getItem(s.nazwa)?'active':''}">❤️</div>

      <img src="${s.zdjecie}">

      <div class="card-top">
        <div class="dragon-name">${s.nazwa}</div>
        <div class="badge">${s.typ}</div>
      </div>

      <div class="dragon-info">

        <div class="section">⚔️ ${s.atak}</div>
        <div class="section">🍖 ${s.pokarm}</div>

        <div class="section">
          📊 Moc: <strong>${s.moc}/100</strong>
          <div class="power-bar">
            <div class="power-fill" style="width:${s.moc}%"></div>
          </div>
        </div>

      </div>
    `;

    container.appendChild(div);
  });

  addEvents();
  fillCompare();
}

/* EVENTS */
function addEvents(){

  document.querySelectorAll(".dragon-card").forEach(c=>{
    c.addEventListener("click",()=>c.classList.toggle("active"));
  });

  document.querySelectorAll(".fav").forEach(f=>{
    f.onclick = e=>{
      e.stopPropagation();
      const n = f.closest(".dragon-card").dataset.name;
      f.classList.toggle("active");
      localStorage.getItem(n)
        ? localStorage.removeItem(n)
        : localStorage.setItem(n,"1");
    };
  });
}

/* COMPARE */
function fillCompare(){
  const a=document.getElementById("dragon1");
  const b=document.getElementById("dragon2");

  a.innerHTML=b.innerHTML="";

  smoki.forEach(s=>{
    a.innerHTML+=`<option>${s.nazwa}</option>`;
    b.innerHTML+=`<option>${s.nazwa}</option>`;
  });
}

/* VS ANIMATION */
function compareDragons(){

  const a = smoki.find(s=>s.nazwa==dragon1.value);
  const b = smoki.find(s=>s.nazwa==dragon2.value);

  const vs = document.getElementById("vsBox");
  const box = document.querySelector(".compare-box");

  vs.classList.add("active");
  setTimeout(()=>vs.classList.remove("active"),1200);

  box.classList.add("flash");
  setTimeout(()=>box.classList.remove("flash"),600);

  const w = a.moc>b.moc?a:b;

  document.getElementById("compareResult").innerHTML=`
    🥇 Wygrywa: <b>${w.nazwa}</b><br>
    ${a.nazwa}: ${a.moc} vs ${b.nazwa}: ${b.moc}
  `;
}

/* CONTROLS */
search.oninput=render;
classFilter.onchange=render;
sortSelect.onchange=render;

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* START */
renderDragonOfDay();
render();
let selected = [];

function addEvents(){

  document.querySelectorAll(".dragon-card").forEach(card => {

    card.addEventListener("click", (e) => {

      const name = card.dataset.name;
      const dragon = smoki.find(s => s.nazwa === name);

      // toggle selection
      if(selected.find(s => s.nazwa === name)){
        selected = selected.filter(s => s.nazwa !== name);
        card.classList.remove("selected");
      } else {

        if(selected.length >= 2) return; // max 2

        selected.push(dragon);
        card.classList.add("selected");
      }

      // gdy 2 wybrane → walka
      if(selected.length === 2){
        startBattle();
      }
    });

  });

}

/* WALKA + VS */
function startBattle(){

  const a = selected[0];
  const b = selected[1];

  const vs = document.getElementById("vsBox");
  const box = document.querySelector(".compare-box");

  vs.classList.add("active");
  box.classList.add("flash");

  setTimeout(()=>{
    vs.classList.remove("active");
    box.classList.remove("flash");
  }, 1000);

  const winner = a.moc > b.moc ? a : b;

  document.getElementById("compareResult").innerHTML = `
    ⚔️ WALKA<br><br>
    🐉 ${a.nazwa} (${a.moc}) vs ${b.nazwa} (${b.moc})<br><br>
    🥇 Wygrywa: <b>${winner.nazwa}</b>
  `;

  // reset po walce
  setTimeout(()=>{
    selected = [];
    document.querySelectorAll(".dragon-card").forEach(c=>{
      c.classList.remove("selected");
    });
  }, 1500);
}
</script>

</body>
</html>
