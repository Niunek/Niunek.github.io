<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Smoczki</title>

  <link rel="stylesheet" href="index-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU KSIĄŻKA -->
<div class="book-menu">
  <button class="book-toggle" onclick="toggleMenu()">📖 Menu</button>

  <div id="bookPanel" class="book-panel">
    <a href="index.html" class="book-btn">🏠 Strona główna</a>
    <a href="smoki.html" class="book-btn">🐉 Encyklopedia smoków</a>
    <a href="stronka2.html" class="book-btn">😂 Memy</a>
  </div>
</div>

<!-- TŁO -->
<div id="particles"></div>

<!-- TYTUŁ -->
<h1 class="gaming-title">Królestwo Smoków</h1>
<p class="subtitle">Smoki, memy i serwer Minecraft</p>

<!-- OBRAZKI -->
<a href="stronka2.html">
  <img src="smoki/smoczek.jpg" width="300">
</a>

<div class="gallery">
  <img src="smoki/NFdance.jpg" class="zoom">
  <img src="smoki/BFdance.jpg" class="zoom">
  <img src="smoki/NFsing.jpg" class="zoom">
  <img src="smoki/BFsing.jpg" class="zoom">
</div>

<!-- SERWER -->
<div class="server-card" onclick="toggleDescription()">
  <div class="server-title">▶ Serwer Minecraft</div>
  <div id="server-desc" class="server-description">
    <b>Nazwa:</b> Fantasy.SMP<br>
    <b>IP:</b> 146.103.49.18<br>
    <b>Wersja:</b> 1.21.11
  </div>
</div>

<!-- MEMY -->
<div class="mem-section">
  <h2>Zobacz memy</h2>
  <a href="stronka2.html">
    <button class="mem-button">Przejdź</button>
  </a>
</div>

<!-- SOCIAL -->
<div class="social-container">
  <h2>Sociale</h2>

  <div class="social-grid">
    <a class="social-card youtube" href="https://youtube.com">
      <i class="fab fa-youtube"></i>
      YouTube
    </a>

    <a class="social-card instagram" href="https://instagram.com">
      <i class="fab fa-instagram"></i>
      Instagram
    </a>

    <a class="social-card discord" href="https://discord.com">
      <i class="fab fa-discord"></i>
      Discord
    </a>
  </div>
</div>

<!-- SCRIPTY -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
function toggleDescription() {
  document.getElementById("server-desc").classList.toggle("show");
}

function toggleMenu() {
  document.getElementById("bookPanel").classList.toggle("active");
}

particlesJS("particles", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 }
  }
});
</script>

</body>
</html>
